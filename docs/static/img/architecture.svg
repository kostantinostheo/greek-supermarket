<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 680" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow-down" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#e87b35"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-skill" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#e87b35"/>
    </marker>
  </defs>

  <!-- ===== CLIENT LAYER ===== -->
  <rect x="50" y="20" width="650" height="105" rx="6" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="80" y="50" font-size="13" font-weight="600" fill="#64748b">Client Layer</text>

  <rect x="80" y="62" width="110" height="46" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="135" y="84" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Claude Desktop</text>
  <text x="135" y="99" text-anchor="middle" font-size="9" fill="#7c3aed">AI Client</text>

  <rect x="205" y="62" width="110" height="46" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="260" y="84" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Claude Code</text>
  <text x="260" y="99" text-anchor="middle" font-size="9" fill="#7c3aed">CLI Agent</text>

  <rect x="330" y="62" width="110" height="46" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="385" y="84" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Cursor</text>
  <text x="385" y="99" text-anchor="middle" font-size="9" fill="#7c3aed">AI Client</text>

  <rect x="455" y="62" width="110" height="46" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="510" y="84" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">VS Code</text>
  <text x="510" y="99" text-anchor="middle" font-size="9" fill="#7c3aed">Copilot</text>

  <rect x="580" y="62" width="110" height="46" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="635" y="84" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Zed / Other</text>
  <text x="635" y="99" text-anchor="middle" font-size="9" fill="#7c3aed">MCP Client</text>

  <!-- Arrows: Clients <-> MCP -->
  <line x1="365" y1="125" x2="365" y2="175" stroke="#e87b35" stroke-width="1.5" marker-end="url(#arrow-down)"/>
  <text x="340" y="156" font-size="8" fill="#e87b35" text-anchor="end">tool calls</text>
  <line x1="385" y1="175" x2="385" y2="125" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-up)"/>
  <text x="410" y="156" font-size="8" fill="#8b5cf6">results</text>
  <text x="425" y="146" font-size="8" font-weight="600" fill="#94a3b8">stdio</text>

  <!-- ===== MCP LAYER ===== -->
  <rect x="50" y="175" width="650" height="120" rx="6" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="80" y="205" font-size="13" font-weight="600" fill="#64748b">MCP Layer</text>

  <rect x="220" y="190" width="310" height="90" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="375" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">MCP Server</text>
  <text x="375" y="238" text-anchor="middle" font-size="10" fill="#64748b">Python · Model Context Protocol</text>

  <rect x="240" y="248" width="270" height="22" rx="4" fill="#fff7ed" stroke="#e87b35" stroke-width="0.8"/>
  <text x="375" y="263" text-anchor="middle" font-size="9" fill="#c2410c">6 tools · products · categories · merchants</text>

  <!-- Skill file badge -->
  <rect x="555" y="205" width="110" height="46" rx="8" fill="#fff7ed" stroke="#e87b35" stroke-width="1.2"/>
  <text x="610" y="227" text-anchor="middle" font-size="10" font-weight="600" fill="#e87b35">Skill File</text>
  <text x="610" y="243" text-anchor="middle" font-size="9" fill="#c2410c">.md</text>

  <line x1="555" y1="228" x2="532" y2="228" stroke="#e87b35" stroke-width="1.2" marker-end="url(#arrow-skill)"/>

  <!-- Arrows: MCP <-> API -->
  <line x1="365" y1="295" x2="365" y2="355" stroke="#e87b35" stroke-width="1.5" marker-end="url(#arrow-down)"/>
  <text x="340" y="332" font-size="8" fill="#e87b35" text-anchor="end">HTTP request</text>
  <line x1="385" y1="355" x2="385" y2="295" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-up)"/>
  <text x="410" y="332" font-size="8" fill="#8b5cf6">JSON response</text>

  <!-- ===== API LAYER ===== -->
  <rect x="50" y="355" width="650" height="150" rx="6" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="80" y="385" font-size="13" font-weight="600" fill="#64748b">API Layer</text>

  <rect x="200" y="370" width="420" height="120" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="410" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">REST API</text>

  <rect x="225" y="415" width="175" height="32" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="312" y="436" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Express.js · Port 8000</text>

  <rect x="420" y="415" width="175" height="32" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="507" y="436" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Swagger UI</text>

  <rect x="225" y="456" width="370" height="24" rx="4" fill="#fff7ed" stroke="#e87b35" stroke-width="0.8"/>
  <text x="410" y="472" text-anchor="middle" font-size="10" fill="#c2410c">/api/v1/products · /api/v1/categories · /api/v1/merchants</text>

  <!-- Arrows: API <-> Data -->
  <line x1="365" y1="505" x2="365" y2="565" stroke="#e87b35" stroke-width="1.5" marker-end="url(#arrow-down)"/>
  <text x="340" y="542" font-size="8" fill="#e87b35" text-anchor="end">request</text>
  <line x1="385" y1="565" x2="385" y2="505" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-up)"/>
  <text x="410" y="542" font-size="8" fill="#8b5cf6">data</text>

  <!-- ===== DATA LAYER ===== -->
  <rect x="50" y="565" width="650" height="95" rx="6" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="80" y="595" font-size="13" font-weight="600" fill="#64748b">Data Layer</text>

  <rect x="270" y="590" width="155" height="46" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="347" y="618" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Public Price Data</text>

  <rect x="455" y="590" width="155" height="46" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="532" y="618" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Product Catalog</text>
</svg>
